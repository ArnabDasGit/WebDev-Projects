<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GardenGlow - Sign in</title>
    <style>
        body{
            padding: 0;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgb(141, 175, 145);
        }
        #content{
            height: 75vh;
            width: 70vw;
            display: flex;
            margin: 100px;
            box-shadow: 0 0 8px 8px #3e3e3e;
            background-image: url(image/sign.jpg);
            background-repeat: no-repeat;
            background-size: cover;
        }
        #box1,#box2{
            width: 50%;
            padding: 30px 50px;

        }
        #box2{
            background-color: #fff;
        }
        h3{
            color: #00bb00;
        }
        h1,p{
            font-size: 50px;
            margin: 0;
        }
        p{
            font-size: 20px;
        }
        form{
            display: grid;
            gap: 20px;
            margin: 30px 0;
        }
        input{
            padding: 10px;
            border: none;
            border-bottom: 2px solid #d3d3d3;
        }
        button{
            width: 170px;
            margin: 20px 0;
            padding: 10px;
            background-color: #385534;
            border: 2px solid #385534;
            color: #fff;
        }
        button:active{
            cursor: pointer;
            background-color: #62865d;
            border: 2px solid #62865d;
        }
        button:hover{
            transition: 0.3s linear;
            padding: 12px;
            background-color: #fff;
            color: #62865d;
            border: 2px solid #62865d;
        }
    </style>
</head>
<body>
    <div id="content">
        <div id="box1">

        </div>
        <div id="box2">
            <h3>GardenGlow.</h3>
            <h1>Hello there.</h1>
            <p>you need an account to continue</p>
            <form>
                <input type="text" name="name" id="name" placeholder="Full Name">
                <input type="email" name="mail" id="mail" placeholder="Email">
                <input type="password" name="password" id="password" placeholder="Password">
                <input type="password" name="repeat" id="repeat" placeholder="Repeat password">
            </form>
            <a href="index1.html" target="_self"><button type="submit">Sign in</button></a>
        </div>
    </div>
</body>
</html>
