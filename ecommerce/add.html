<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GardenGlow - Sign in</title>
    <style>
        body{
            padding: 0;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: rgb(141, 175, 145);
            font-family: Arial, sans-serif;
        }
        #content{
            height: auto;
            min-height: 75vh;
            width: 90%;
            max-width: 1200px;
            display: flex;
            margin: 50px 0;
            box-shadow: 0 0 8px 8px #3e3e3e;
            background-image: url(image/sign.jpg);
            background-repeat: no-repeat;
            background-size: cover;
            flex-wrap: wrap;
        }
        #box1, #box2{
            width: 100%;
            padding: 30px;
            box-sizing: border-box;
        }
        #box1 {
            display: none;
        }
        #box2{
            background-color: #fff;
        }
        h3{
            color: #00bb00;
            margin: 0 0 20px 0;
        }
        h1,p{
            font-size: 2rem;
            margin: 0 0 10px 0;
        }
        p{
            font-size: 1rem;
        }
        .form-toggle {
            margin: 20px 0;
            display: flex;
            gap: 20px;
        }
        .form-toggle button {
            background: none;
            border: none;
            color: #385534;
            font-weight: bold;
            cursor: pointer;
            padding: 5px 10px;
            font-size: 1rem;
        }
        .form-toggle button.active {
            border-bottom: 2px solid #385534;
        }
        form{
            display: grid;
            gap: 20px;
            margin: 30px 0;
        }
        .login-form {
            display: none;
        }
        input{
            padding: 10px;
            border: none;
            border-bottom: 2px solid #d3d3d3;
            width: 100%;
            box-sizing: border-box;
        }
        button.submit-btn{
            width: 170px;
            margin: 20px 0;
            padding: 10px;
            background-color: #385534;
            border: 2px solid #385534;
            color: #fff;
            cursor: pointer;
        }
        button.submit-btn:active{
            background-color: #62865d;
            border: 2px solid #62865d;
        }
        button.submit-btn:hover{
            transition: 0.3s linear;
            padding: 12px;
            background-color: #fff;
            color: #62865d;
            border: 2px solid #62865d;
        }
        @media (min-width: 768px) {
            #content {
                flex-wrap: nowrap;
                height: 75vh;
            }
            #box1, #box2 {
                width: 50%;
            }
            #box1 {
                display: block;
            }
            h1 {
                font-size: 3rem;
            }
            p {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div id="content">
        <div id="box1"></div>
        <div id="box2">
            <h3>GardenGlow.</h3>
            <h1>Hello there.</h1>
            <p>You need an account to continue</p>
            
            <div class="form-toggle">
                <button id="login-toggle" class="active">Login</button>
                <button id="signup-toggle">Sign Up</button>
            </div>
            
            <form id="login-form" class="login-form">
                <input type="email" name="mail" id="login-mail" placeholder="Email" required>
                <input type="password" name="password" id="login-password" placeholder="Password" required>
                <button type="submit" class="submit-btn">Login</button>
            </form>
            
            <form id="signup-form">
                <input type="text" name="name" id="name" placeholder="Full Name" required>
                <input type="email" name="mail" id="mail" placeholder="Email" required>
                <input type="password" name="password" id="password" placeholder="Password" required>
                <input type="password" name="repeat" id="repeat" placeholder="Repeat password" required>
                <button type="submit" class="submit-btn">Sign Up</button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const loginToggle = document.getElementById('login-toggle');
            const signupToggle = document.getElementById('signup-toggle');
            const loginForm = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');
            
            // Initially show signup form (as it was in original design)
            // But we'll toggle based on user selection
            loginForm.style.display = 'none';
            signupForm.style.display = 'grid';
            
            loginToggle.addEventListener('click', function() {
                loginForm.style.display = 'grid';
                signupForm.style.display = 'none';
                loginToggle.classList.add('active');
                signupToggle.classList.remove('active');
            });
            
            signupToggle.addEventListener('click', function() {
                loginForm.style.display = 'none';
                signupForm.style.display = 'grid';
                signupToggle.classList.add('active');
                loginToggle.classList.remove('active');
            });
            
            // Form submission handlers
            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();
                // Add your login logic here
                alert('Login functionality would go here');
            });
            
            signupForm.addEventListener('submit', function(e) {
                e.preventDefault();
                // Add your signup logic here
                const password = document.getElementById('password').value;
                const repeatPassword = document.getElementById('repeat').value;
                
                if (password !== repeatPassword) {
                    alert('Passwords do not match!');
                    return;
                }
                
                alert('Signup successful! (This would redirect in a real app)');
            });
            
            // Responsive adjustments
            function handleResize() {
                // Add any additional responsive logic if needed
            }
            
            window.addEventListener('resize', handleResize);
            handleResize();
        });
    </script>
</body>
</html>
